{% extends "base.html" %}
{% block title %}发起签到{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h3>发起签到</h3>
        <form method="post">
            <div class="mb-3">
                <label>有效期（分钟）</label>
                <input type="number" name="duration" value="10" class="form-control" min="1" max="120">
            </div>
            <button type="submit" class="btn btn-primary">生成签到码</button>
        </form>
    </div>
</div>
{% endblock %}
