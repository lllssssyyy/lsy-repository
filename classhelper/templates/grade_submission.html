{% extends "base.html" %}
{% block title %}评分{% endblock %}
{% block content %}
<h2>为作业「{{ assignment.title }}」评分</h2>
<p>学生提交内容：{{ submission.content_text }}</p>
<form method="post">
    <div class="mb-3">
        <label>分数 (0-100)</label>
        <input type="number" name="grade" step="0.1" min="0" max="100" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">提交评分</button>
</form>
{% endblock %}
